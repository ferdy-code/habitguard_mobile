name: habitguard_mobile
description: HabitGuard - Smart Habit Tracker + Screen Time Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3

  # Local DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # Charts
  fl_chart: ^0.68.0

  # Storage
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Widget & Share
  home_widget: ^0.7.0
  image_picker: ^1.1.2
  share_plus: 12.0.2
  screenshot: ^3.0.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
